<section class="hero">
  <div>
    <h2>Dashboard</h2>
    <p class="intro">A focused overview of delivery, reliability, and active work.</p>
  </div>
</section>

<section class="employee-list">
  <div class="section-heading">
    <h3>Employees</h3>
    <button
      *ngFor="let action of employeeHeaderActions"
      [class]="action.className"
      type="button"
      (click)="runHeaderAction(action)"
    >
      {{ action.label }}
    </button>
  </div>

  <div class="table-responsive">
    <table class="table align-middle">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Department</th>
          <th>Work mode</th>
          <th class="text-end">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let employee of employees">
          <td>{{ employee.employeeName }}</td>
          <td>{{ employee.email }}</td>
          <td>{{ employee.department }}</td>
          <td>{{ employee.workMode }}</td>
          <td class="text-end">
            <button
              *ngFor="let action of employeeActions"
              [class]="action.className"
              type="button"
              (click)="runEmployeeAction(action, employee)"
            >
              {{ action.label }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<app-dynamic-form
  [form]="form"
  [config]="formConfig"
  [title]="formModeLabel"
  [mode]="formMode"
/>
