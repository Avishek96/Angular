<header>
  <div>
    <p>Administration</p>
    <h1>Users</h1>
  </div>
  <label>
    <span class="visually-hidden">Filter users</span>
    <input
      type="search"
      placeholder="Filter users..."
      [value]="query()"
      (input)="updateQuery($event)"
    />
  </label>
</header>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Email</th>
        <th>Role</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      @for (user of filteredUsers(); track user.id) {
        <tr>
          <td>
            <span class="avatar">{{ user.name | initials }}</span>
            {{ user.name }}
          </td>
          <td>{{ user.email }}</td>
          <td>{{ user.role }}</td>
          <td>
            <span class="status" [class.inactive]="!user.active">
              {{ user.active ? 'Active' : 'Inactive' }}
            </span>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="4" class="empty">No users match your search.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
