<section class="auth-card card card-outline card-primary">
  <div class="card-header">
    <h1 class="card-title">Sign in</h1>
  </div>

  <form class="form-horizontal" (submit)="$event.preventDefault(); signIn()">
    <div class="card-body">
      <div class="row mb-3">
        <label class="col-sm-3 col-form-label" for="authProvider">Provider</label>
        <div class="col-sm-9">
          <input
            class="form-control"
            id="authProvider"
            type="text"
            value="OpenID Connect"
            readonly
          />
        </div>
      </div>

      @if (error()) {
        <div class="row mb-3">
          <div class="offset-sm-3 col-sm-9">
            <p class="error" role="alert">{{ error() }}</p>
          </div>
        </div>
      }
    </div>

    <div class="card-footer">
      <button class="btn btn-primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Redirecting...' : 'Sign in' }}
      </button>
    </div>
  </form>
</section>
